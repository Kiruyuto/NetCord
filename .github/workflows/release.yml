name: 'Release Please'

on:
  push:
    branches: [ 'testt' ]

permissions: write-all

jobs:
  release-please:
    name: 'Release Please'
    runs-on: [ 'ubuntu-latest' ]
    outputs:
      releases_created: ${{ steps.run-release-please.outputs.releases_created }}
      NetCord--release_created: ${{ steps.run-release-please.outputs.NetCord--release_created }}
    permissions: write-all
    steps:
      - name: 'Generate App Token'
        uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID}}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: 'Run release-please'
        uses: googleapis/release-please-action@v4.2.0
        id: run-release-please
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          target-branch: testt # TODO: Del
      - name: 'Echo json'
        run: echo "$OUTPUTS"
        env:
          OUTPUTS: ${{ toJSON(steps.run-release-please.outputs) }}

  release-api:
    name: 'Release API'
    runs-on: [ 'ubuntu-latest' ]
    needs: 'release-please'
    if: ${{ needs.release-please.outputs.NetCord--release_created }}
    timeout-minutes: 10
    steps:
      - name: "Run testt"
        run: echo "Testt"